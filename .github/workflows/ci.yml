name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (frontend)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build frontend
        run: npm run build:client

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: dist/client/
          retention-days: 7

  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (backend)
        run: npx tsc --noEmit -p tsconfig.server.json

      - name: Build backend
        run: npm run build:server

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: dist/api/
          retention-days: 7

  ml-service:
    name: ML Service Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ml-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        working-directory: ml-service
        run: python -m py_compile app/main.py

      - name: Import check
        working-directory: ml-service
        run: python -c "from app.main import app; print('ML Service OK')"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ai-album-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML service image
        uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: false
          tags: ai-album-ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
